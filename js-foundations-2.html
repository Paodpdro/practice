<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function add7(num) {
            return num +7;
        }
        console.log(add7(10))


        function multiply(num1, num2) {
            return num1 * num2
        }
        console.log(multiply(3,2))

        function capitalize(word) {
           const result = word.charAt(0).toUpperCase() + word.substring(1, word.length).toLowerCase()
           return result           
        }
        console.log(capitalize("aBcD"))
        console.log(capitalize("abcd"))
        console.log(capitalize("ABCD"))

        function lastLetter(word) {
            const result = word.at(-1)
            return result
        }
        console.log(lastLetter("abcd"))

    </script>
</body>
</html>
